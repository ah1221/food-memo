<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食べたいものメモ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🍴 食べたいものメモ</h1>
      <p class="subtitle">いつか食べたいもの、忘れないうちにメモしよう</p>
    </header>

    <!-- 入力エリア -->
    <form id="addForm" class="addForm">
      <input
        type="text"
        id="foodInput"
        placeholder="例：あの店のラーメン"
        maxlength="100"
        autocomplete="off"
        required
      >
      <button type="submit">追加</button>
    </form>

    <!-- 残数表示 & 表示切替 -->
    <div class="status">
      <span class="statusText"><span id="remainCount">0</span> 個のリストがあります</span>
      <div class="viewToggle">
        <button type="button" id="listViewBtn" class="viewBtn active" title="リスト表示">📋</button>
        <button type="button" id="tileViewBtn" class="viewBtn" title="タイル表示">🖼️</button>
      </div>
    </div>

    <!-- リスト表示エリア -->
    <ul id="foodList" class="foodList"></ul>

    <!-- タイル表示エリア -->
    <div id="foodTiles" class="foodTiles hidden"></div>

    <!-- 何も無いときの表示 -->
    <p id="emptyMessage" class="emptyMessage">まだ何もメモがありません ✏️</p>
  </div>

  <!-- お店検索のポップアップ -->
  <div id="searchModal" class="modalOverlay hidden">
    <div class="modal">
      <button class="modalCloseBtn" id="modalCloseBtn" title="閉じる">×</button>
      <h2>「<span id="modalFoodName"></span>」のお店を探す</h2>

      <!-- 写真アップロードエリア -->
      <div class="photoArea">
        <div id="photoPreview" class="photoPreview">
          <span class="photoPlaceholder">📷 写真がまだありません</span>
        </div>
        <div class="photoBtns">
          <button type="button" id="photoAutoBtn" class="photoAutoBtn">🔄 自動取得</button>
          <label for="photoInput" class="photoUploadBtn">📷 自分でアップ</label>
          <button type="button" id="photoDeleteBtn" class="photoDeleteBtn hidden">🗑️ 削除</button>
        </div>
        <input type="file" id="photoInput" accept="image/*" hidden>
      </div>

      <p class="modalNote">どのサービスで探しますか？</p>
      <div class="modalLinks">
        <a id="linkTabelog" href="#" target="_blank" rel="noopener" class="modalLink tabelog">
          <span class="modalLinkIcon">🍽️</span>
          <span class="modalLinkText">
            <strong>食べログ</strong>
            <small>近くの人気店を探す</small>
          </span>
        </a>
        <a id="linkUberEats" href="#" target="_blank" rel="noopener" class="modalLink ubereats">
          <span class="modalLinkIcon">🛵</span>
          <span class="modalLinkText">
            <strong>Uber Eats</strong>
            <small>すぐ届けてもらう</small>
          </span>
        </a>
        <a id="linkGoogleMaps" href="#" target="_blank" rel="noopener" class="modalLink gmaps">
          <span class="modalLinkIcon">🗺️</span>
          <span class="modalLinkText">
            <strong>Google Maps</strong>
            <small>地図で近くを探す</small>
          </span>
        </a>
      </div>

      <!-- お店メモ欄：見つけた店をメモする -->
      <div class="storeMemoArea">
        <label for="storeNameInput" class="storeMemoLabel">
          📍 場所（買えるお店）
        </label>
        <input
          type="text"
          id="storeNameInput"
          placeholder="例：〇〇ラーメン 渋谷店"
          maxlength="100"
          autocomplete="off"
        >

        <!-- 期間限定情報 -->
        <label for="periodInput" class="storeMemoLabel periodLabel">
          🏷️ 対象期間（期間限定の場合）
        </label>
        <input
          type="text"
          id="periodInput"
          placeholder="例：6月30日まで"
          maxlength="60"
          autocomplete="off"
        >

        <label for="priceInput" class="storeMemoLabel periodLabel">
          💴 値段
        </label>
        <input
          type="text"
          id="priceInput"
          placeholder="例：1,200円"
          maxlength="30"
          autocomplete="off"
        >

        <p class="storeMemoHint">
          全部の項目が自動保存されます。空欄でもOK、後から書き足せます。
        </p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
